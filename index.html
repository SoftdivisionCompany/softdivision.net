<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFTDIVISION</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #131314; /* Düz renk arka plan */
            overflow: hidden;
        }

        /* Sol Üst Navigasyon - Beyaz ve Roboto */
        .top-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            gap: 25px;
        }

            .top-nav a {
                font-family: 'Roboto', sans-serif;
                font-weight: 300;
                font-size: 14px;
                letter-spacing: 1px;
                color: #FFFFFF; /* Beyaz renk */
                text-decoration: none;
                text-transform: uppercase;
                transition: opacity 0.3s ease;
            }

                .top-nav a:hover {
                    opacity: 0.7;
                }

        #stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #code-block {
            font-family: 'Roboto Mono', monospace;
            font-size: 18px;
            line-height: 30px;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        .line {
            display: block;
            white-space: pre;
            min-height: 30px;
        }

        /* Syntax colors */
        .blue {
            color: #8AB4F8;
        }

        .pink {
            color: #C58AF9;
        }

        .yellow {
            color: #FDD663;
        }

        .lgrey {
            color: #C4C7C5;
        }

        .mgrey {
            color: #80868B;
        }

        .green {
            color: #81C995;
        }

        .orange {
            color: #FA903E;
        }

        #cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: #C4C7C5;
            vertical-align: middle;
            margin-left: 1px;
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="mailto:hello@softdivision.net">CONTACT</a>
        <a href="community.html">COMMUNITY</a>
    </nav>

    <div id="stage">
        <div id="code-block"></div>
    </div>

    <script>
        /* Mevcut LINES içeriği korundu */
        const LINES = [
            [{ t: '#include', c: 'blue' }, { t: ' <iostream>', c: 'lgrey' }],
            [{ t: '#include', c: 'blue' }, { t: ' <string>', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: 'int ', c: 'pink' }, { t: 'main', c: 'yellow' }, { t: '() {', c: 'lgrey' }],
            [{ t: '    // Version configuration', c: 'mgrey' }],
            [{ t: '    ' }, { t: 'const ', c: 'pink' }, { t: 'std::string ', c: 'lgrey' },
            { t: 'version', c: 'lgrey' }, { t: ' = ', c: 'lgrey' }, { t: '"v0.1.0"', c: 'green' }],
            [{ t: '' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"================================================="', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"        SOFTDIVISION SIX "', c: 'green' },
            { t: ' << version << std::endl;', c: 'lgrey' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"        Company: SOFTDIVISION "', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"        Product: SIX (Softdivision Interactive eXperience...) "', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"        Status: Initializing Experience..."', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '    std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"================================================="', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: '    ' }, { t: 'return ', c: 'pink' }, { t: '0', c: 'orange' }, { t: ';', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: '}', c: 'lgrey' }],
        ];

        const container = document.getElementById('code-block');
        const cursorEl = document.createElement('span');
        cursorEl.id = 'cursor';

        let lineIdx = 0;
        let segIdx = 0;
        let charIdx = 0;
        let currentLineEl = null;
        let currentSegEl = null;

        function delay() {
            return 18 + Math.random() * 28;
        }

        function newLine() {
            const el = document.createElement('div');
            el.className = 'line';
            container.appendChild(el);
            return el;
        }

        function newSpan(cls) {
            const el = document.createElement('span');
            if (cls) el.className = cls;
            return el;
        }

        function tick() {
            if (lineIdx >= LINES.length) {
                // Döngü için sıfırlama eklendi
                setTimeout(() => {
                    container.innerHTML = '';
                    lineIdx = 0; segIdx = 0; charIdx = 0;
                    tick();
                }, 3000);
                return;
            }

            const segs = LINES[lineIdx];

            if (segIdx === 0 && charIdx === 0) {
                currentLineEl = newLine();
                currentLineEl.appendChild(cursorEl);
            }

            if (segs.length === 1 && segs[0].t === '') {
                lineIdx++;
                segIdx = 0;
                charIdx = 0;
                setTimeout(tick, 60);
                return;
            }

            const seg = segs[segIdx];

            if (charIdx === 0) {
                currentSegEl = newSpan(seg.c);
                currentLineEl.insertBefore(currentSegEl, cursorEl);
            }

            currentSegEl.textContent += seg.t[charIdx];
            charIdx++;

            if (charIdx >= seg.t.length) {
                segIdx++;
                charIdx = 0;
                if (segIdx >= segs.length) {
                    lineIdx++;
                    segIdx = 0;
