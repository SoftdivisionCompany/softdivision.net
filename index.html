<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softdivision | SIX</title>
    <meta name="description" content="Softdivision SIX (Softdivision Interactive eXperience) Next-Generation Digital Content Creation Software">
    <meta name="keywords" content="3D software, DCC, modeling, animation, rendering, procedural generation, AI workflow, Softdivision SIX, Softdivision Interactive eXperience, Softdivision">
    <meta name="author" content="Softdivision">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #131314;
            overflow: hidden;
        }

        #stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #code-block {
            font-family: 'Roboto Mono', monospace;
            font-size: 18px;
            line-height: 30px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .line {
            display: block;
            white-space: pre;
            min-height: 30px;
        }

        .blue {
            color: #8AB4F8;
        }

        .pink {
            color: #C58AF9;
        }

        .yellow {
            color: #FDD663;
        }

        .lgrey {
            color: #C4C7C5;
        }

        .mgrey {
            color: #80868B;
        }

        .green {
            color: #81C995;
        }

        .orange {
            color: #FA903E;
        }

        #cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: #C4C7C5;
            vertical-align: middle;
            margin-left: 1px;
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .seo-content {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        /* Sağ Alt Navigasyon Butonu */
        .fixed-nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            font-family: 'Roboto Mono', monospace;
        }

        .nav-button {
            background: rgba(48, 54, 61, 0.8);
            color: #81C995;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid #30363d;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

            .nav-button:hover {
                border-color: #81C995;
                background: #30363d;
                box-shadow: 0 0 15px rgba(129, 201, 149, 0.2);
            }
    </style>
</head>
<body>
    <div class="seo-content">
        <h1>SOFTDIVISION SIX - Advanced 3D Digital Content Creation Software</h1>
        <p>SOFTDIVISION SIX is a next-generation digital content creation (DCC) platform.</p>
    </div>

    <div id="stage">
        <div id="code-block"></div>
    </div>

    <div class="fixed-nav">
        <a href="community.html" class="nav-button">[ 01: DISCUSSIONS_HQ ]</a>
    </div>

    <script>
        const LINES = [
            [{ t: '#include', c: 'blue' }, { t: ' <iostream>', c: 'lgrey' }],
            [{ t: '#include', c: 'blue' }, { t: ' <string>', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: 'int ', c: 'pink' }, { t: 'main', c: 'yellow' }, { t: '() {', c: 'lgrey' }],
            [{ t: '  // Version configuration', c: 'mgrey' }],
            [{ t: '  ' }, { t: 'const ', c: 'pink' }, { t: 'std::string ', c: 'lgrey' },
            { t: 'version', c: 'lgrey' }, { t: ' = ', c: 'lgrey' }, { t: '"v0.1.0"', c: 'green' }, { t: ';', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"================================================="', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"     SOFTDIVISION SIX     "', c: 'green' },
            { t: ' << version << std::endl;', c: 'lgrey' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"     Company: SOFTDIVISION     "', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"     Product: SIX (Softdivision Interactive eXperience) "', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"     Status: Initializing Experience... "', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '  std::cout', c: 'lgrey' }, { t: ' << ', c: 'lgrey' },
            { t: '"================================================="', c: 'green' },
            { t: ' << std::endl;', c: 'lgrey' }],
            [{ t: '' }],
            [{ t: '  ' }, { t: 'return ', c: 'pink' }, { t: '0', c: 'orange' }, { t: ';', c: 'lgrey' }],
            [{ t: '}', c: 'lgrey' }],
        ];

        const container = document.getElementById('code-block');
        const cursorEl = document.createElement('span');
        cursorEl.id = 'cursor';

        let lineIdx = 0, segIdx = 0, charIdx = 0, currentLineEl = null, currentSegEl = null;

        function tick() {
            if (lineIdx >= LINES.length) {
                setTimeout(() => {
                    container.innerHTML = '';
                    lineIdx = 0; segIdx = 0; charIdx = 0;
                    tick();
                }, 2000);
                return;
            }
            const segs = LINES[lineIdx];
            if (segIdx === 0 && charIdx === 0) {
                currentLineEl = document.createElement('div');
                currentLineEl.className = 'line';
                container.appendChild(currentLineEl);
                currentLineEl.appendChild(cursorEl);
            }
            if (segs.length === 1 && segs[0].t === '') {
                lineIdx++; setTimeout(tick, 60); return;
            }
            const seg = segs[segIdx];
            if (charIdx === 0) {
                currentSegEl = document.createElement('span');
                if (seg.c) currentSegEl.className = seg.c;
                currentLineEl.insertBefore(currentSegEl, cursorEl);
            }
            currentSegEl.textContent += seg.t[charIdx];
            charIdx++;
            if (charIdx >= seg.t.length) {
                segIdx++; charIdx = 0;
                if (segIdx >= segs.length) { lineIdx++; segIdx = 0; }
            }
            setTimeout(tick, 18 + Math.random() * 25);
        }
        setTimeout(tick, 600);
    </script>
</body>
</html>
